<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Navbar</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

.navbar {
    background-color: #2c3e50;
    overflow: hidden;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.navbar a {
    float: left;
    color: white;
    text-align: center;
    padding: 14px 20px;
    text-decoration: none;
    transition: background-color 0.3s;
}

.navbar a:hover {
    background-color: #34495e;
}
</style>

</head>
<body>

<div class="navbar">
    <a href="acceuil">Accueil</a>
    <a href="ajout">Ajouter Produit</a>
    <a href="categories">Gérer Catégories</a>
</div>

</body>
</html>
